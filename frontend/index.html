<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JOi — Voice AI Agent</title>
  <style>

    /* ── RESET + BASE ───────────────────────────────────────────────── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #191931;
      color: #f4f4f8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── HEADER ─────────────────────────────────────────────────────── */
    header {
      width: 100%;
      max-width: 720px;
      padding: 24px 20px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 23px;
      font-weight: 700;
      color: #a78bfa;
      letter-spacing: -0.5px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #34d399;
    }

    .status-dot.offline {
      background: #6b7280;
    }

    /* ── CHAT WINDOW ────────────────────────────────────────────────── */
    #chat-window {
      width: 100%;
      max-width: 720px;
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── MESSAGES ───────────────────────────────────────────────────── */
    .message {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.5;
    }

    .message.user {
      background: #4f46e5;
      color: #ffffff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.joi {
      background: #1e1e2e;
      color: #e2e2e8;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border: 1px solid #2e2e42;
    }

    .message.system {
      background: transparent;
      color: #6b7280;
      align-self: center;
      font-size: 13px;
      font-style: italic;
    }

    /* ── INPUT BAR ──────────────────────────────────────────────────── */
    #input-bar {
      width: 100%;
      max-width: 720px;
      padding: 16px 20px 28px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #text-input {
      flex: 1;
      background: #1e1e2e;
      border: 1px solid #2e2e42;
      border-radius: 12px;
      padding: 12px 16px;
      color: #e2e2e8;
      font-size: 15px;
      resize: none;
      outline: none;
      min-height: 48px;
      max-height: 120px;
      font-family: inherit;
    }

    #text-input::placeholder {
      color: #4b5563;
    }

    #text-input:focus {
      border-color: #4f46e5;
    }

    /* ── BUTTONS ────────────────────────────────────────────────────── */
    button {
      cursor: pointer;
      border: none;
      border-radius: 12px;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:active {
      transform: scale(0.95);
    }

    #send-btn {
      width: 48px;
      height: 48px;
      background: #4f46e5;
      color: white;
      font-size: 18px;
    }
    
    #mic-btn {
      width: 48px;
      height: 48px;
      background: #1e1e2e;
      border: 1px solid #2e2e42;
      color: #a78bfa;
      font-size: 20px;
    }
    #mic-btn:hover{
        border-color : #9312d8;
    }

    #mic-btn.recording {
      background: #7f1d1d;
      border-color: #ef4444;
      color: #ef4444;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.6; }
    }

    /* ── LOADING INDICATOR ──────────────────────────────────────────── */
    .thinking {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: #1e1e2e;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      border: 1px solid #2e2e42;
      align-self: flex-start;
    }

    .thinking span {
      width: 6px;
      height: 6px;
      background: #6b7280;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .thinking span:nth-child(2) { animation-delay: 0.2s; }
    .thinking span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-6px); }
    }

    /* ── FILE LOAD BAR ──────────────────────────────────────────────── */
    #file-bar {
      width: 100%;
      max-width: 720px;
      padding: 6px 20px 6px;
      display: flex;
      gap: 8px;
    }

    #file-path-input {
      flex: 1;
      background: #1e1e2e;
      border: 1px solid #2e2e42;
      border-radius: 10px;
      padding: 8px 14px;
      color: #e2e2e8;
      font-size: 13px;
      outline: none;
      font-family: "SF Mono", monospace;
    }

    #file-path-input::placeholder {
      color: #1265d8;
    }

    #file-path-input:focus {
      border-color: #4f46e5;
    }
    
    

    #load-btn {
      padding: 8px 16px;
      background: #1e1e2e;
      border: 1px solid #2e2e42;
      border-radius: 10px;
      color: #a78bfa;
      font-size: 13px;
      white-space: nowrap;
    }

    #load-btn:hover {
      border-color:  #9312d8;
    }

    /* ── SCROLLBAR ──────────────────────────────────────────────────── */
    #chat-window::-webkit-scrollbar { width: 4px; }
    #chat-window::-webkit-scrollbar-track { background: transparent; }
    #chat-window::-webkit-scrollbar-thumb { background: #2e2e42; border-radius: 2px; }

  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <span class="logo">Joi</span>
    <div class="status-dot" id="status-dot"></div>
  </header>

  <!-- CHAT WINDOW -->
  <div id="chat-window">
    <div class="message system">Joi is ready. Speak or type below.</div>
  </div>

  <!-- FILE LOAD BAR -->
  <div id="file-bar">
    <input
      type="text"
      id="file-path-input"
      placeholder="/path/to/document.pdf"
    />
    <button id="load-btn">Load doc</button>
  </div>

  <!-- INPUT BAR -->
  <div id="input-bar">
    <button id="mic-btn" title="Hold to record">🎤</button>
    <textarea
      id="text-input"
      placeholder="Type a message or press the mic..."
      rows="1"
    ></textarea>
    <button id="send-btn" title="Send">↑</button>
  </div>
<script>
const API = "http://127.0.0.1:8000";

// ── DOM REFERENCES ──────────────────────────────────────────────────────────
const chatWindow   = document.getElementById("chat-window");
const textInput    = document.getElementById("text-input");
const sendBtn      = document.getElementById("send-btn");
const micBtn       = document.getElementById("mic-btn");
const loadBtn      = document.getElementById("load-btn");
const filePathInput= document.getElementById("file-path-input");
const statusDot    = document.getElementById("status-dot");

// ── STATE ───────────────────────────────────────────────────────────────────
let mediaRecorder = null;
let audioChunks   = [];
let isRecording   = false;

function addMessage(text,role){
  const div = document.createElement("div");
  div.className = `message ${role}`;
  div.textContent = text;
  chatWindow.appendChild(div);
  chatWindow.scrollTop = chatWindow.scrollHeight;
  return div;
}
function addThinking(){
  const div = document.createElement("div");
  div.className = "thinking";
  div.id = "thinking";
  div.innerHTML ="<span></span><span></span><span></span>";
  chatWindow.appendChild(div);
  chatWindow.scrollTop = chatWindow.scrollHeight;
}
function removeThinking(){
  const t = document.getElementById("thinking");
  if (t) t.remove();
}
function  playAudio(url){
  const audio = new Audio(API + url);
  audio.play();

}
async function checkHealth(){
  try{
    const res = await fetch(`${API}/status`);
    if (res.ok) statusDot.classList.remove("offline");
  }
  catch{
    statusDot.classList.add("offline")
  }
}

//send text 

async function sendText() {
  const message = textInput.value.trim();
  if(!message){
    return;
  }  
  addMessage(message, "user");
  textInput.value = "";
  addThinking();

  try{
    const res = await fetch(`${API}/chat/text`,{
      method : "POST",
      headers : "application/json",
      body : JSON.stringify({message})
    })
    const data = await res.json();
    removeThinking();
    if(data.status === "ok"){
      addMessage(data.reply , "Joi");
      if(data.audio_url){
        playAudio(data.audio_url);
      }
    }
    else{
        addMessage("something went wrong", "system");
    }
    
  }
  catch(e){
    removeThinking();
    addMessage("could not reach Joi, check serer", "system");
  }
}


</script>
</body>
</html>
